version: '3'

services:
  web_cheuqeo:
    image: nginx:stable-alpine3.21-perl
    restart: always
    container_name: web_cheuqeo
    volumes:
      - ./client/dist:/usr/share/nginx/html
      - ./config/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - red-gane-int

  api-cheuqeo:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: api-cheuqeo
    restart: always
    image: api-cheuqeo-v1.0
    networks:
      - red-gane-int
    environment:
      - TZ=America/Bogota
      
networks:
  red-gane-int:
    external: true
